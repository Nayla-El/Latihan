<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto</title>
</head>
<body>

    <h1>Galeri Foto Liburan</h1>

    <p>
        <a href="#video">Lihat ke Video</a>
    </p>

    <hr>

    <figure>
        <a href="https://example.com">
            <img src="pantai.jpg" alt="Pantai saat sunset" width="300">
        </a>
        <figcaption>Sunset di Pantai</figcaption>
    </figure>

    <figure>
        <a href="https://example.com">
            <img src="gunung.jpg" alt="Pemandangan gunung" width="300">
        </a>
        <figcaption>Pemandangan Gunung</figcaption>
    </figure>

    <hr>

    <h2 id="video">Video Liburan</h2>

    <video controls width="400">
        <source src="video.mp4" type="video/mp4">
        Browser Anda tidak mendukung video.
    </video>

    <p>
        <a href="#">Kembali ke Atas</a>
    </p>

</body>
</html>
